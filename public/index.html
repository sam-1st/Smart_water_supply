<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Water System – Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark: #0b3d6e;
      --blue-mid:  #1565c0;
      --blue-light:#e8f0fe;
      --teal:      #00897b;
      --teal-light:#e0f2f1;
      --white:     #ffffff;
      --gray-100:  #f5f7fa;
      --gray-300:  #d0d5dd;
      --gray-500:  #667085;
      --gray-700:  #344054;
      --error:     #d32f2f;
      --success:   #388e3c;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--blue-dark) 0%, #1a5276 50%, var(--teal) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      color: var(--white);
    }

    .logo {
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.6rem;
    }

    .card-header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.01em; }
    .card-header p  { font-size: 0.82rem; opacity: 0.8; margin-top: 0.25rem; }

    .tabs {
      display: flex;
      border-bottom: 2px solid var(--gray-100);
    }
    .tab-btn {
      flex: 1; padding: 0.9rem;
      background: none; border: none; cursor: pointer;
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      color: var(--gray-500);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active { color: var(--blue-mid); border-bottom-color: var(--blue-mid); }

    .tab-panel { display: none; padding: 1.75rem 2rem 2rem; }
    .tab-panel.active { display: block; }

    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.4rem; }
    input, select {
      width: 100%; padding: 0.65rem 0.85rem;
      border: 1.5px solid var(--gray-300);
      border-radius: 8px;
      font-family: inherit; font-size: 0.9rem; color: var(--gray-700);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--blue-mid);
      box-shadow: 0 0 0 3px rgba(21,101,192,0.12);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .btn {
      width: 100%; padding: 0.75rem;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--blue-mid); color: var(--white); }
    .btn-primary:hover { opacity: 0.9; }

    .alert {
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      font-size: 0.83rem;
      margin-bottom: 1rem;
      display: none;
    }
    .alert.error   { background: #fdecea; color: var(--error); border: 1px solid #f5c6c6; }
    .alert.success { background: #e8f5e9; color: var(--success); border: 1px solid #c8e6c9; }
    .alert.show    { display: block; }

    .hint { font-size: 0.78rem; color: var(--gray-500); margin-top: 0.35rem; }

    .footer-note {
      text-align: center;
      padding: 1rem;
      font-size: 0.78rem;
      color: var(--gray-500);
      background: var(--gray-100);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">💧</div>
    <h1>Smart Water System</h1>
    <p>Water Supply & Notification Portal</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- LOGIN PANEL -->
  <div class="tab-panel active" id="tab-login">
    <div class="alert error" id="login-error"></div>
    <div class="alert success" id="login-success"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" />
    </div>
    <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
    <p class="hint" style="text-align:center; margin-top:1rem;">
      Admin? Use <strong>admin@waterboard.com</strong> / <strong>Admin@1234</strong>
    </p>
  </div>

  <!-- REGISTER PANEL -->
  <div class="tab-panel" id="tab-register">
    <div class="alert error" id="reg-error"></div>
    <div class="alert success" id="reg-success"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="John Doe" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="tel" id="reg-phone" placeholder="+254 700 000000" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" />
      </div>
      <div class="form-group">
        <label>Zone</label>
        <select id="reg-zone">
          <option value="">Loading zones…</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>
  </div>

  <div class="footer-note">Smart Water Supply & Notification System &copy; 2024</div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert ${type} show`;
    setTimeout(() => el.classList.remove('show'), 5000);
  }

  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showAlert('login-error', 'Please fill in all fields.', 'error');

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) return showAlert('login-error', data.error, 'error');
      showAlert('login-success', 'Login successful! Redirecting…', 'success');
      setTimeout(() => window.location.href = '/dashboard.html', 800);
    } catch {
      showAlert('login-error', 'Server error. Please try again.', 'error');
    }
  }

  async function handleRegister() {
    const full_name = document.getElementById('reg-name').value.trim();
    const email     = document.getElementById('reg-email').value.trim();
    const password  = document.getElementById('reg-password').value;
    const zone      = document.getElementById('reg-zone').value;
    const phone     = document.getElementById('reg-phone').value.trim();

    if (!full_name || !email || !password || !zone)
      return showAlert('reg-error', 'Please fill in all required fields.', 'error');

    try {
      const res  = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_name, email, password, zone, phone })
      });
      const data = await res.json();
      if (!res.ok) return showAlert('reg-error', data.error, 'error');
      showAlert('reg-success', 'Account created! You can now sign in.', 'success');
      setTimeout(() => switchTab('login'), 1500);
    } catch {
      showAlert('reg-error', 'Server error. Please try again.', 'error');
    }
  }

  async function loadZones() {
    try {
      const res = await fetch('/api/public/zones');
      if (!res.ok) throw new Error();
      const zones = await res.json();
      const sel = document.getElementById('reg-zone');
      sel.innerHTML = '<option value="">Select zone…</option>' +
        zones.map(z => `<option value="${esc(z.name)}">${esc(z.name)}</option>`).join('');
    } catch {
      document.getElementById('reg-zone').innerHTML = '<option value="">Failed to load zones</option>';
    }
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadZones();

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('tab-login').classList.contains('active')) handleLogin();
      else handleRegister();
    }
  });
</script>
</body>
</html>
